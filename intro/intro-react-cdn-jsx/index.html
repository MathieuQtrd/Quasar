<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Index</title>
  </head>
  <body>
    <div id="root"></div>   
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script> 

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 
      Le navigateur ne comprend pas le jsx, Babel permet de traduire notre code jsx en js (compilation/transpilation) classique pour le navigateur

    -->
    <script type="text/babel" src="index.jsx"></script>
    <!-- type="text/babel" ce script doit être traité avec babel avant d'être exécuté -->
  </body>
</html>
