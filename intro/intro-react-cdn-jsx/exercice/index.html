<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="index.css">
    <title>Index</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Le navigateur ne comprend pas le jsx, Babel permet de le traduire (compilation/transpilation) en javascript classique pour le navigateur -->
     <!-- Compilation => passage d'un langage vers un autre -->
     <!-- transpilation => passage d'un langage vers le même langage js => js (syntaxe différente) -->

    <script type="text/babel" src="index.jsx"></script>
    <!-- type="text/babel" => ce script doit être transformé par Babel avant d’être exécuté. -->
  </body>
</html>
